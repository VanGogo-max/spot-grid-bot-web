name: 📦 Ежедневен бекъп на логовете

on:
  schedule:
    - cron: '0 2 * * *'  # Всеки ден в 2:00 UTC

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Клониране на репото
        uses: actions/checkout@v4

      - name: 📁 Създаване на архив
        run: |
          mkdir -p logs/archive
          tar -czf logs/archive/backup-$(date +%Y%m%d).tar.gz logs/*.log 2>/dev/null || true

      - name: 💾 Запазване на архива
        uses: actions/upload-artifact@v4
        with:
          name: logs-backup-${{ github.run_id }}
          path: logs/archive/*.tar.gz
          retention-days: 7
